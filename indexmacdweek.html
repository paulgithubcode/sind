<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>IDX MACD Weekly Scanner (IndexedDB)</title>

<link rel="stylesheet"
href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">

<style>
body {
    font-family: Arial;
    padding: 20px;
}

.dt-right { text-align: right; }
.pos { color: green; font-weight: bold; }
.neg { color: red; font-weight: bold; }
.controls { margin-bottom: 10px; }

/* ===== FREEZE COLUMN ===== */
#table th:nth-child(1),
#table td:nth-child(1) {
    position: sticky;
    left: 0;
    background: #fff;
    z-index: 3;
}

#table th:nth-child(2),
#table td:nth-child(2) {
    position: sticky;
    left: 60px;
    background: #fff;
    z-index: 3;
}

#table thead th {
    z-index: 4;
}
</style>
</head>

<body>

<h3>IDX MACD WEEKLY SCANNER</h3>

<div class="controls">
<label>Pilih tanggal (minggu): </label>
<input type="date" id="weekDate">
<button onclick="scan()">Scan</button>
</div>

<table id="table" class="display" style="width:100%">
<thead>
<tr>

<th>No</th>
<th>Kode</th>

<th>Open</th>
<th>High</th>
<th>Low</th>
<th>Close</th>
<th>Volume</th>

<th>MACD</th>
<th>Signal</th>

<th>Hist-9</th>
<th>Hist-8</th>
<th>Hist-7</th>
<th>Hist-6</th>
<th>Hist-5</th>
<th>Hist-4</th>
<th>Hist-3</th>
<th>Hist-2</th>
<th>Hist-1</th>
<th>Hist0</th>

<th>ΔHist</th>

<th>%Δ 9→8</th>
<th>%Δ 8→7</th>
<th>%Δ 7→6</th>
<th>%Δ 6→5</th>
<th>%Δ 5→4</th>
<th>%Δ 4→3</th>
<th>%Δ 3→2</th>
<th>%Δ 2→1</th>
<th>%Δ 1→0</th>

<th>Chart MACD Histogram</th>

</tr>
</thead>
</table>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<script>

/* ================= DATABASE ================= */

let db;

function openDB(){
    return new Promise((resolve,reject)=>{
        const req=indexedDB.open("idxDB",1);

        req.onsuccess=e=>{
            db=e.target.result;
            resolve();
        };

        req.onerror=reject;
    });
}

/* ================= GET DATA ================= */

function getAllDaily(){
    return new Promise(resolve=>{
        const tx=db.transaction("daily","readonly");
        const store=tx.objectStore("daily");
        const req=store.getAll();

        req.onsuccess=()=>resolve(req.result);
    });
}

/* ================= WEEK KEY ================= */

function weekKey(date){
    const d=new Date(date);
    const day=d.getDay();
    const diff=d.getDate()-day+(day===0?-6:1);
    const monday=new Date(d.setDate(diff));
    return monday.toISOString().split("T")[0];
}

/* ================= BUILD WEEKLY ================= */

function buildWeekly(rows){

    let map={};

    rows.forEach(r=>{

        const w=weekKey(r.date);

        if(!map[w]){
            map[w]={
                date:w,
                open:r.o,
                high:r.h,
                low:r.l,
                close:r.c,
                volume:r.v
            };
        }else{
            map[w].high=Math.max(map[w].high,r.h);
            map[w].low=Math.min(map[w].low,r.l);
            map[w].close=r.c;
            map[w].volume+=r.v;
        }

    });

    return Object.values(map)
    .sort((a,b)=>new Date(a.date)-new Date(b.date));
}

/* ================= EMA ================= */

function EMA(values,period){

    const k=2/(period+1);
    let ema=[];
    let prev=values[0];

    values.forEach((v,i)=>{
        prev=i===0?v:v*k+prev*(1-k);
        ema.push(prev);
    });

    return ema;
}

/* ================= MACD ================= */

function MACD(close){

    if(close.length<35) return null;

    const ema12=EMA(close,12);
    const ema26=EMA(close,26);

    let macd=close.map((v,i)=>ema12[i]-ema26[i]);
    const signal=EMA(macd,9);
    let hist=macd.map((v,i)=>v-signal[i]);

    let last=hist.length-1;

    return{
        macd:macd[last],
        signal:signal[last],
        hist:hist.slice(last-9,last+1)
    };
}

/* ================= HIST STATS ================= */

function histStats(hist){

    let deltaHist=hist[9]-hist[8];
    let pct=[];

    for(let i=0;i<9;i++){
        let a=hist[i];
        let b=hist[i+1];
        pct.push(((b-a)/Math.abs(a))*100);
    }

    return{
        deltaHist,
        pct
    };
}

/* ================= FORMAT ================= */

function cell(v){
    if(v==null) return "-";
    const cls=v>0?"pos":"neg";
    return `<span class="${cls}">${v.toFixed(4)}</span>`;
}

function pctCell(v){
    if(!isFinite(v)) return "-";
    const cls=v>0?"pos":"neg";
    return `<span class="${cls}">${v.toFixed(2)}%</span>`;
}

/* ================= WARNA HIST ================= */

function getHistColor(curr, prev, index){

    if(index===0 || prev==null){
        if(curr>0) return "#006400";
        if(curr<0) return "#8b0000";
        return "gray";
    }

    let diff = curr - prev;

    if(curr>=0){
        return diff>0 ? "#006400" : "#00ff00";
    }

    if(curr<0){
        return diff<0 ? "#8b0000" : "#ff7f7f";
    }

    return "gray";
}

/* ================= MINI CHART ================= */

function renderHistChart(row){

    const raw = [
        row.h9,row.h8,row.h7,row.h6,row.h5,
        row.h4,row.h3,row.h2,row.h1,row.h0
    ];

    // 🔥 handle null
    const h = raw.map(v => v ?? 0);

    let max = Math.max(...h.map(v=>Math.abs(v)));
    if(max === 0) max = 1;

    let colors = h.map((v,i)=>getHistColor(v,h[i-1],i));

    let bars = h.map((v,i)=>{

        let height = (Math.abs(v)/max)*20 + 2;

        if(v >= 0){
            // ✅ POSITIF → ke atas
            return `
            <div style="width:6px;display:flex;flex-direction:column;margin-right:1px">
                <div style="height:${20-height}px"></div>
                <div style="height:${height}px;background:${colors[i]}"></div>
                <div style="height:20px"></div>
            </div>`;
        }else{
            // ✅ NEGATIF → ke bawah
            return `
            <div style="width:6px;display:flex;flex-direction:column;margin-right:1px">
                <div style="height:20px"></div>
                <div style="height:${height}px;background:${colors[i]}"></div>
                <div style="height:${20-height}px"></div>
            </div>`;
        }

    }).join("");

	return `
	<div style="
		position:relative;
		height:50px;
		display:flex;
		align-items:center;
	">

		<!-- GARIS 0 (CENTER) -->
		<div style="
			position:absolute;
			top:50%;
			left:0;
			right:0;
			height:1px;
			background:#999;
		"></div>

		${bars}

	</div>`;
}

/* ================= FIND WEEK ================= */

function findWeekIndex(weekly,date){

    const w=weekKey(date);

    for(let i=0;i<weekly.length;i++){
        if(weekly[i].date===w) return i;
    }

    return -1;
}

/* ================= SCAN ================= */

async function scan(){

    await openDB();
    const rows=await getAllDaily();

    let byCode={};

    rows.forEach(r=>{
        if(!byCode[r.code]) byCode[r.code]=[];
        byCode[r.code].push(r);
    });

    const selectedDate=document.getElementById("weekDate").value;
    let result=[];

    Object.keys(byCode).forEach(code=>{

        const weekly=buildWeekly(byCode[code]);
        const idx=findWeekIndex(weekly,selectedDate);

        if(idx<35) return;

        const close=weekly.slice(0,idx+1).map(x=>x.close);
        const macd=MACD(close);
        if(!macd) return;

        const stats=histStats(macd.hist);
        const last=weekly[idx];
        const h=macd.hist;

        result.push({
            code:code,

            open:last.open,
            high:last.high,
            low:last.low,
            close:last.close,
            volume:last.volume,

            macd:macd.macd,
            signal:macd.signal,

            h9:h[0], h8:h[1], h7:h[2], h6:h[3], h5:h[4],
            h4:h[5], h3:h[6], h2:h[7], h1:h[8], h0:h[9],

            deltaHist:stats.deltaHist,

            p98:stats.pct[0],
            p87:stats.pct[1],
            p76:stats.pct[2],
            p65:stats.pct[3],
            p54:stats.pct[4],
            p43:stats.pct[5],
            p32:stats.pct[6],
            p21:stats.pct[7],
            p10:stats.pct[8]
        });

    });

    render(result);
}

/* ================= TABLE ================= */

let table;

function render(data){

    if(table) table.destroy();

    table=$("#table").DataTable({

        data:data,
        paging:false,
        order:[[20,"desc"]],

        columns:[

            {data:null},
            {data:"code"},

            {data:"open",className:"dt-right"},
            {data:"high",className:"dt-right"},
            {data:"low",className:"dt-right"},
            {data:"close",className:"dt-right"},
            {data:"volume",className:"dt-right"},

            {data:"macd",className:"dt-right",render:d=>d?d.toFixed(4):"-"},
            {data:"signal",className:"dt-right",render:d=>d?d.toFixed(4):"-"},

            {data:"h9",render:cell},
            {data:"h8",render:cell},
            {data:"h7",render:cell},
            {data:"h6",render:cell},
            {data:"h5",render:cell},
            {data:"h4",render:cell},
            {data:"h3",render:cell},
            {data:"h2",render:cell},
            {data:"h1",render:cell},
            {data:"h0",render:cell},

            {data:"deltaHist",render:cell},

            {data:"p98",render:pctCell},
            {data:"p87",render:pctCell},
            {data:"p76",render:pctCell},
            {data:"p65",render:pctCell},
            {data:"p54",render:pctCell},
            {data:"p43",render:pctCell},
            {data:"p32",render:pctCell},
            {data:"p21",render:pctCell},
            {data:"p10",render:pctCell},

            {
                data:null,
                orderable:false,
                render:row=>renderHistChart(row)
            }

        ],

        drawCallback:function(){

            const api=this.api();

            api.column(0).nodes().each((cell,i)=>{
                cell.innerHTML=i+1;
            });

        }

    });

}

/* ================= INIT ================= */

document.getElementById("weekDate").value =
new Date().toISOString().split("T")[0];

</script>

</body>
</html>
