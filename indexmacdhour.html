<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>PLUANG MACD SCANNER (ACCURATE)</title>

<link rel="stylesheet"
href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<style>
body { font-family: Arial; padding:20px; }
.pos { color: green; font-weight: bold; }
.neg { color: red; font-weight: bold; }
</style>
</head>

<body>

<h3>PLUANG MACD SCANNER</h3>

<table id="table" class="display" style="width:100%">
<thead>
<tr>
<th>No</th>
<th>Kode</th>
<th>Open</th>
<th>High</th>
<th>Low</th>
<th>Close</th>
<th>Volume</th>
<th>MACD</th>
<th>Signal</th>

<th>Hist-9</th><th>Hist-8</th><th>Hist-7</th><th>Hist-6</th><th>Hist-5</th>
<th>Hist-4</th><th>Hist-3</th><th>Hist-2</th><th>Hist-1</th><th>Hist0</th>

<th>ΔHist</th>

<th>%Δ 9→8</th><th>%Δ 8→7</th><th>%Δ 7→6</th><th>%Δ 6→5</th>
<th>%Δ 5→4</th><th>%Δ 4→3</th><th>%Δ 3→2</th><th>%Δ 2→1</th><th>%Δ 1→0</th>

<th>Chart</th>
</tr>
</thead>
</table>

<script>

// ================= TIME =================
function toISO(d){
  return d.toISOString().split(".")[0]+".000Z";
}

function toStartOfDay(date){
  let d = new Date(date);
  d.setUTCHours(0,0,0,0);
  return d;
}

// ================= FETCH =================
async function fetchOHLC(stockId, startTime){

  let start = toStartOfDay(startTime);
  let now = toStartOfDay(new Date());

  let urls=[];

  while(true){
    let next = new Date(start);
    next.setUTCMonth(next.getUTCMonth()+1);
    if(next >= now) break;

    urls.push(`https://indo-stock-api-v2.pluang.com/api/v2/indo-stock/market-feed/ohlc/${stockId}?startTime=${toISO(start)}&endTime=${toISO(next)}&timeFrame=HOURLY`);
    start = next;
  }

  urls.push(`https://indo-stock-api-v2.pluang.com/api/v2/indo-stock/market-feed/ohlc/${stockId}?startTime=${toISO(start)}&endTime=${toISO(now)}&timeFrame=HOURLY`);
  urls.push(`https://indo-stock-api-v2.pluang.com/api/v2/indo-stock/market-feed/ohlc/${stockId}?startTime=${toISO(now)}&timeFrame=HOURLY`);

  const res = await Promise.all(urls.map(u=>fetch(u).then(r=>r.json())));
  return res.flatMap(r=>r.data||[]);
}

// ================= EMA (TradingView Style) =================
function EMA_TV(values, period){

  const k = 2/(period+1);
  let ema = [];

  let sma = values.slice(0,period)
      .reduce((a,b)=>a+b,0)/period;

  ema[period-1] = sma;

  for(let i=period;i<values.length;i++){
    ema[i] = values[i]*k + ema[i-1]*(1-k);
  }

  return ema;
}

// ================= MACD =================
function MACD(close){

  if(close.length < 35) return null;

  const ema12 = EMA_TV(close,12);
  const ema26 = EMA_TV(close,26);

  let macd = close.map((v,i)=> (ema12[i]??0)-(ema26[i]??0));

  const signal = EMA_TV(macd.slice(26),9);
  let fullSignal = Array(26).fill(null).concat(signal);

  let hist = macd.map((v,i)=> v-(fullSignal[i]??0));

  let last = hist.length-1;

  return {
    macd: macd[last],
    signal: fullSignal[last],
    hist: hist.slice(last-9,last+1)
  };
}

// ================= HIST =================
function histStats(hist){

  let delta = hist[9]-hist[8];
  let pct=[];

  for(let i=0;i<9;i++){
    pct.push(((hist[i+1]-hist[i])/Math.abs(hist[i]))*100);
  }

  return {delta,pct};
}

// ================= FORMAT =================
function cell(v){
  if(v==null) return "-";
  const cls = v>0?"pos":"neg";
  return `<span class="${cls}">${v.toFixed(4)}</span>`;
}

function pctCell(v){
  if(!isFinite(v)) return "-";
  const cls = v>0?"pos":"neg";
  return `<span class="${cls}">${v.toFixed(2)}%</span>`;
}

// ================= HIST COLOR =================
function getHistColor(curr, prev, index){

  if(index===0 || prev==null){
    if(curr>0) return "#006400";
    if(curr<0) return "#8b0000";
    return "gray";
  }

  let diff = curr - prev;

  if(curr>=0) return diff>0 ? "#006400" : "#00ff00";
  if(curr<0) return diff<0 ? "#8b0000" : "#ff7f7f";

  return "gray";
}

// ================= CHART =================
function renderChart(row){

  const h=[
    row.h9,row.h8,row.h7,row.h6,row.h5,
    row.h4,row.h3,row.h2,row.h1,row.h0
  ].map(v=>v??0);

  let max=Math.max(...h.map(v=>Math.abs(v)));
  if(max===0) max=1;

  let colors=h.map((v,i)=>getHistColor(v,h[i-1],i));

  let bars=h.map((v,i)=>{

    let height=(Math.abs(v)/max)*20+2;

    if(v>=0){
      return `<div style="width:6px;display:flex;flex-direction:column;margin-right:1px">
        <div style="height:${20-height}px"></div>
        <div style="height:${height}px;background:${colors[i]}"></div>
        <div style="height:20px"></div>
      </div>`;
    }else{
      return `<div style="width:6px;display:flex;flex-direction:column;margin-right:1px">
        <div style="height:20px"></div>
        <div style="height:${height}px;background:${colors[i]}"></div>
        <div style="height:${20-height}px"></div>
      </div>`;
    }

  }).join("");

  return `<div style="position:relative;height:50px;display:flex;align-items:center">
    <div style="position:absolute;top:50%;left:0;right:0;height:1px;background:#999"></div>
    ${bars}
  </div>`;
}

// ================= RUN =================
async function run(){

  const data = await fetchOHLC(10020,"2026-02-01T00:00:00.000Z");

  const close = data.map(x=>x.cl);
  const last = data[data.length-1];

  const macd = MACD(close);
  const stats = histStats(macd.hist);
  const h = macd.hist;

  const row=[{
    code:last.sc,
    open:last.op,
    high:last.hi,
    low:last.lo,
    close:last.cl,
    volume:last.vol,

    macd:macd.macd,
    signal:macd.signal,

    h9:h[0],h8:h[1],h7:h[2],h6:h[3],h5:h[4],
    h4:h[5],h3:h[6],h2:h[7],h1:h[8],h0:h[9],

    deltaHist:stats.delta,

    p98:stats.pct[0],
    p87:stats.pct[1],
    p76:stats.pct[2],
    p65:stats.pct[3],
    p54:stats.pct[4],
    p43:stats.pct[5],
    p32:stats.pct[6],
    p21:stats.pct[7],
    p10:stats.pct[8]
  }];

  $('#table').DataTable({
    data:row,
    paging:false,
    info:false,
    columns:[
      {data:null},
      {data:"code"},
      {data:"open"},
      {data:"high"},
      {data:"low"},
      {data:"close"},
      {data:"volume"},
      {data:"macd",render:d=>d.toFixed(4)},
      {data:"signal",render:d=>d.toFixed(4)},

      {data:"h9",render:cell},
      {data:"h8",render:cell},
      {data:"h7",render:cell},
      {data:"h6",render:cell},
      {data:"h5",render:cell},
      {data:"h4",render:cell},
      {data:"h3",render:cell},
      {data:"h2",render:cell},
      {data:"h1",render:cell},
      {data:"h0",render:cell},

      {data:"deltaHist",render:cell},

      {data:"p98",render:pctCell},
      {data:"p87",render:pctCell},
      {data:"p76",render:pctCell},
      {data:"p65",render:pctCell},
      {data:"p54",render:pctCell},
      {data:"p43",render:pctCell},
      {data:"p32",render:pctCell},
      {data:"p21",render:pctCell},
      {data:"p10",render:pctCell},

      {data:null, render:renderChart}
    ],
    drawCallback:function(){
      this.api().column(0).nodes().each((cell,i)=>{
        cell.innerHTML=i+1;
      });
    }
  });
}

run();

</script>

</body>
</html>
