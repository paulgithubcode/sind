name: Cron Job Example

on:
  schedule:
    - cron: "*/5 * * * *"   # tiap 5 menit
  workflow_dispatch:        # biar bisa dijalankan manual juga

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run script
        run: |
          echo "Jalan tiap 5 menit"
          date