<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Indodax EMA Scanner All Coin</title>


<style>

body{
background:#111;
color:white;
font-family:Arial;
}


table{
width:100%;
border-collapse:collapse;
font-size:12px;
}


th,td{
border:1px solid #555;
padding:6px;
text-align:center;
}


th{
background:#222;
}


.green{
color:#00ff88;
}


</style>


</head>


<body>


<h2>Indodax EMA20 Pullback Scanner</h2>


<table>


<thead>

<tr>

<th>Pair</th>
<th>Price</th>

<th>EMA High 1D</th>
<th>EMA Low 1D</th>

<th>EMA High 4H</th>
<th>EMA Low 4H</th>

<th>EMA High 1H</th>
<th>EMA Low 1H</th>

<th>Uptrend</th>
<th>Pullback</th>

<th>Entry</th>

</tr>

</thead>


<tbody id="result"></tbody>


</table>





<script>


const EMA_PERIOD = 20;

const WARMUP = 5;


let now;



function updateTime(){

now =
Math.floor(Date.now()/1000);

}






async function getPairs(){


let r =
await fetch(
"https://indodax.com/api/pairs"
);


let data =
await r.json();



return data.filter(x =>
x.id.endsWith("idr")
);


}







function getFrom(tf){


let sec;


if(tf=="1D")
sec=86400;


if(tf=="240")
sec=240*60;


if(tf=="60")
sec=60*60;



return now -
(sec*EMA_PERIOD*WARMUP);


}








async function getCandle(pair,tf){


let url =
`https://indodax.com/tradingview/history_v2?from=${getFrom(tf)}&symbol=${pair}&tf=${tf}&to=${now}`;



let r =
await fetch(url);



return await r.json();


}







function ema(arr,period){


let result=[];


let k =
2/(period+1);



let prev =
arr[0];


result.push(prev);



for(let i=1;i<arr.length;i++){


let v =
arr[i]*k +
prev*(1-k);


result.push(v);


prev=v;


}


return result;


}





function getEMA(candles){


let high =
candles.map(x=>Number(x.High));


let low =
candles.map(x=>Number(x.Low));



let eh =
ema(high,EMA_PERIOD);


let el =
ema(low,EMA_PERIOD);



return {

high:eh.at(-1),

low:el.at(-1)

};


}






function sleep(ms){

return new Promise(
resolve=>setTimeout(resolve,ms)
);

}







async function scanPair(pair){


try{


let d1 =
await getCandle(pair,"1D");


await sleep(100);



let d4 =
await getCandle(pair,"240");


await sleep(100);



let d1h =
await getCandle(pair,"60");





if(
d1.length<25 ||
d4.length<25 ||
d1h.length<25
)
return;






let e1 =
getEMA(d1);



let e4 =
getEMA(d4);



let e1h =
getEMA(d1h);






let price =
Number(
d1h.at(-1).Close
);






let up =
price > e1.high;





let pullback =
up &&
price <= e4.high &&
price >= e4.low*0.97;






if(!up || !pullback)
return;






let tr =
document.createElement("tr");



tr.innerHTML = `


<td>${pair.toUpperCase()}</td>


<td>${price.toLocaleString()}</td>



<td>${e1.high.toFixed(0)}</td>

<td>${e1.low.toFixed(0)}</td>



<td>${e4.high.toFixed(0)}</td>

<td>${e4.low.toFixed(0)}</td>



<td>${e1h.high.toFixed(0)}</td>

<td>${e1h.low.toFixed(0)}</td>



<td class="green">YES</td>


<td class="green">YES</td>



<td>${e1h.low.toFixed(0)}</td>


`;



document
.getElementById("result")
.appendChild(tr);



}
catch(e){

console.log(
"error",
pair,
e
);


}


}









async function start(){



document
.getElementById("result")
.innerHTML="";



updateTime();



let pairs =
await getPairs();



console.log(
"TOTAL PAIR",
pairs.length
);





for(let p of pairs){


await scanPair(p.id);


await sleep(300);


}



console.log(
"scan selesai"
);


}







// ======================
// REFRESH SETELAH SELESAI
// ======================


async function refreshLoop(){


while(true){


    await start();


}


}



refreshLoop();



</script>


</body>

</html>
