<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Value Buy vs Sell</title>

<link rel="stylesheet"
href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<style>
body { font-family: Arial; background:#111; color:#eee; }
.buy { color:lime; font-weight:bold; }
.sell { color:red; font-weight:bold; }
.diff-pos { color:cyan; font-weight:bold; }
.diff-neg { color:orange; font-weight:bold; }
</style>
</head>

<body>

<h2>Value Buy vs Sell (1 Menit Terakhir)</h2>

<table id="table" class="display" style="width:100%">
<thead>
<tr>
<th>Symbol</th>
<th>Buy Value</th>
<th>Sell Value</th>
<th>Selisih</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
const SEARCH_API = "https://raw.githubusercontent.com/paulgithubcode/sind/main/datacrypto/search_v2.json";

let table;

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function getSymbols() {
    const res = await fetch(SEARCH_API);
    const data = await res.json();
    return data.map(x => x.id);
}

async function getTrades(symbol) {
    try {
        const res = await fetch(`https://indodax.com/api/trades/${symbol}`);
        return await res.json();
    } catch (e) {
        return [];
    }
}

function calculateValue(trades) {
//    const now = Math.floor(Date.now() / 1000);
//    const oneMinuteAgo = now - 60;

    let buyValue = 0;
    let sellValue = 0;

    for (let t of trades) {
//        const time = parseInt(t.date);
//        if (time >= oneMinuteAgo) {
            const value = parseFloat(t.price) * parseFloat(t.amount);
            if (t.type === "buy") buyValue += value;
            if (t.type === "sell") sellValue += value;
//        }
    }

    return { buyValue, sellValue, diff: buyValue - sellValue };
}

function formatNumber(num) {
    return num.toLocaleString('id-ID', { maximumFractionDigits: 0 });
}

async function loadData() {
    table.clear().draw();

    const symbols = await getSymbols();

    for (let symbol of symbols) {
        const trades = await getTrades(symbol);
        const { buyValue, sellValue, diff } = calculateValue(trades);

        const diffClass = diff >= 0 ? "diff-pos" : "diff-neg";

		table.row.add([
			symbol,
			buyValue,
			sellValue,
			diff
		]).draw(false);

        await sleep(300); // delay 200ms
//		break;
    }

    // sort by selisih terbesar
    table.order([3, 'desc']).draw();
}

$(document).ready(function() {
	table = $('#table').DataTable({
		paging: false,
		searching: true,
		info: false,
		order: [[3, 'desc']],
		columnDefs: [
			{
				targets: 1,
				render: function(data) {
					return `<span class="buy">${(data)}</span>`;
				}
			},
			{
				targets: 2,
				render: function(data) {
					return `<span class="sell">${(data)}</span>`;
				}
			},
			{
				targets: 3,
				render: function(data) {
					let cls = data >= 0 ? "diff-pos" : "diff-neg";
					return `<span class="${cls}">${(data)}</span>`;
				}
			}
		]
	});
    loadData();
//    setInterval(loadData, 60000);
});
</script>

</body>
</html>
