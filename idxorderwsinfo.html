<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Indodax Scalping Momentum Scanner</title>


<style>

body{
background:#111827;
color:white;
font-family:Arial;
padding:20px;
}


table{
width:100%;
border-collapse:collapse;
font-size:13px;
}


th,td{
padding:7px;
border-bottom:1px solid #333;
text-align:center;
}


.buy{
color:#22c55e;
font-weight:bold;
}


.sell{
color:#ef4444;
font-weight:bold;
}


.wait{
color:#facc15;
font-weight:bold;
}


.hot{
background:#064e3b;
}


</style>

</head>


<body>


<h2>🔥 INDODAX ORDERBOOK MOMENTUM SCANNER</h2>


<table>

<thead>

<tr>

<th>PAIR</th>
<th>SCORE</th>
<th>SIGNAL</th>

<th>BID PRESSURE</th>

<th>BEST BID</th>
<th>Δ BID</th>

<th>BEST ASK</th>
<th>Δ ASK</th>

<th>SPREAD</th>

</tr>

</thead>


<tbody id="tbody"></tbody>


</table>



<script>


const WS_URL =
'wss://ws3.indodax.com/ws/';


const AUTH_TOKEN =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE5NDY2MTg0MTV9.UR1lBM6Eqh0yWz-PVirw1uPCxe60FdchR8eNVdsskeo';


const BATCH_SIZE=50;



let pairMap={};

let allPairs=[];



function format(v){

return Number(v)
.toLocaleString(
'id-ID',
{
maximumFractionDigits:8
}
);

}




fetch(
'https://raw.githubusercontent.com/paulgithubcode/sind/main/pairs.json'
)

.then(r=>r.json())

.then(data=>{


allPairs=data;


data.forEach(pair=>{


let id =
pair.old_ticker_id
?
pair.old_ticker_id.replace(/[_-]/g,'')
:
pair.id;



pairMap[id]={


symbol:pair.symbol,


bestBid:0,
bestAsk:0,


lastBid:0,
lastAsk:0,


bidDelta:0,
askDelta:0,


bidSize:0,
askSize:0,


historyBid:[],
historyAsk:[]


};



});



startSockets();



});





function startSockets(){


for(
let i=0;
i<allPairs.length;
i+=BATCH_SIZE
){


createSocket(
allPairs.slice(
i,
i+BATCH_SIZE
)
);


}


}





function createSocket(batch){


const ws =
new WebSocket(WS_URL);



ws.onopen=()=>{


ws.send(
JSON.stringify({

params:{
token:AUTH_TOKEN
},

id:1

})
);



batch.forEach(
(pair,index)=>{


let id =
pair.old_ticker_id
?
pair.old_ticker_id.replace(/[_-]/g,'')
:
pair.id;



setTimeout(()=>{


ws.send(
JSON.stringify({

method:1,

params:{

channel:
`market:order-book-${id}`

},

id:index+1

})
);



},index*100);



});



};




ws.onmessage=(event)=>{


let raw=
String(event.data||'');



raw =
raw.replace(
/}\s*{/g,
'}|SPLIT|{'
);



raw.split('|SPLIT|')
.forEach(x=>{


try{

process(
JSON.parse(x)
);

}catch(e){}


});



};





ws.onclose=()=>{


setTimeout(
()=>createSocket(batch),
5000
);


};



}







function getCoinVolume(row){


for(
let key in row
){


if(
key.endsWith('_volume')
&&
key!=='idr_volume'
){


return parseFloat(row[key])||0;


}


}


return 0;


}








function process(msg){



if(
!msg.result ||
!msg.result.channel
)
return;




if(
!msg.result.channel.startsWith(
'market:order-book-'
)
)
return;




const ob =
msg.result.data?.data;



if(!ob)
return;




let p =
pairMap[ob.pair];



if(!p)
return;





let bid =
ob.bid?.[0];

let ask =
ob.ask?.[0];





if(bid){



let price =
parseFloat(
bid.price
);



if(p.lastBid>0){


p.bidDelta =
(
(price-p.lastBid)
/
p.lastBid
)
*100;


}



p.lastBid =
price;


p.bestBid =
price;


p.bidSize =
getCoinVolume(bid);




p.historyBid.push(price);


if(p.historyBid.length>10)
p.historyBid.shift();



}






if(ask){



let price =
parseFloat(
ask.price
);



if(p.lastAsk>0){


p.askDelta =
(
(price-p.lastAsk)
/
p.lastAsk
)
*100;


}



p.lastAsk =
price;


p.bestAsk =
price;


p.askSize =
getCoinVolume(ask);



p.historyAsk.push(price);


if(p.historyAsk.length>10)
p.historyAsk.shift();



}



}








function calculate(p){



let total =
p.bidSize+p.askSize;



let pressure =
0;



if(total>0)

pressure =
(
p.bidSize/total
)*100;





let spread =
(
(p.bestAsk-p.bestBid)
/
p.bestBid
)*100;





let score=0;




if(pressure>65)
score+=30;


if(p.bidDelta>0)
score+=20;


if(p.askDelta<0)
score+=20;



if(spread<1)
score+=15;




let momentum =
p.bidDelta-p.askDelta;



if(momentum>0)
score+=15;





let signal="WAIT";

let cls="wait";



if(score>=70){

signal="🔥 BUY";

cls="buy";

}


else if(score<40){

signal="SELL";

cls="sell";

}





return {

score,
pressure,
spread,
signal,
cls

};



}








setInterval(()=>{



let rows =
Object.values(pairMap)

.filter(
p=>
p.bestBid &&
p.bestAsk
)

.map(p=>{


return {

p,

...calculate(p)

};


})

.sort(
(a,b)=>
b.score-a.score
);





tbody.innerHTML =


rows.map(x=>{


let p=x.p;



return `


<tr class="
${x.score>=70?'hot':''}
">


<td>${p.symbol}</td>


<td>
${x.score}
</td>


<td class="${x.cls}">
${x.signal}
</td>



<td>
${x.pressure.toFixed(2)}%
</td>



<td>
${format(p.bestBid)}
</td>


<td class="
${p.bidDelta>=0?'buy':'sell'}
">

${p.bidDelta.toFixed(3)}%

</td>




<td>
${format(p.bestAsk)}
</td>


<td class="
${p.askDelta<=0?'buy':'sell'}
">

${p.askDelta.toFixed(3)}%

</td>




<td>

${x.spread.toFixed(3)}%

</td>



</tr>


`;



}).join('');



},1000);



</script>


</body>
</html>
