<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>1 H MACD + EMA (Accurate)</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- DataTables -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<style>
body { font-family: Arial; padding:20px; }
table { width:100%; }
.left { text-align:left; }
canvas { width: 200px !important; height: 90px !important; }
.missing { margin-top:20px; color:red; }
</style>
</head>

<body>

<h2>1 H MACD + EMA50/200 (TradingView Style)</h2>

<table id="tbl" class="display">
<thead>
<tr>
<th>Kode</th>
<th>Open</th>
<th>High</th>
<th>Low</th>
<th>Close</th>
<th>Volume</th>
<th>Trades</th>
<th>EMA50 / EMA200</th>
<th>MACD</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div id="missing" class="missing"></div>

<script>

// ================= EMA ala TradingView =================
function ema_tv(period, prices){
    const k = 2/(period+1);
    let emaArr = [];

    emaArr[0] = prices[0];

    for(let i=1;i<prices.length;i++){
        emaArr[i] = prices[i]*k + emaArr[i-1]*(1-k);
    }

    return emaArr;
}

// ================= WARNA HISTOGRAM =================
function getColor(curr, prev, index){

    // === HANDLE CANDLE PERTAMA ===
    if(index === 0 || prev === null){
        if(curr > 0) return "#006400";   // hijau tua
        if(curr < 0) return "#8b0000";   // merah tua
        return "gray";                   // nol
    }

    let diff = curr - prev;

    // === DI ATAS 0 ===
    if(curr >= 0){
        if(diff > 0) return "#006400";  // hijau tua (naik)
        else return "#00ff00";          // hijau muda (turun)
    }

    // === DI BAWAH 0 ===
    if(curr < 0){
        if(diff < 0) return "#8b0000";  // merah tua (turun)
        else return "#ff7f7f";          // merah muda (naik)
    }

    return "gray";
}

// ================= AMBIL SYMBOL =================
async function getSymbols() {
    const indo = await fetch("https://raw.githubusercontent.com/paulgithubcode/sind/main/datacrypto/search_v2.json").then(r=>r.json());
    const bin = await fetch("https://api.binance.com/api/v3/exchangeInfo").then(r=>r.json());

    const binSymbols = bin.symbols.map(s=>s.symbol);

    let available=[], missing=[];

    indo.filter(d=>d.symbol.endsWith("IDR")).forEach(d=>{
        let usdt = d.symbol.replace("IDR","USDT");
        if(binSymbols.includes(usdt)) available.push(usdt);
        else missing.push(d.symbol);
    });

    return {available, missing};
}

// ================= FETCH DATA =================
async function fetchData(symbol){
    const data = await fetch(
        `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1h&limit=1000`
    ).then(r=>r.json());

    const closes = data.map(d=>parseFloat(d[4]));

    const ema12 = ema_tv(12, closes);
    const ema26 = ema_tv(26, closes);
    const ema50 = ema_tv(50, closes);
    const ema200 = ema_tv(200, closes);

    // MACD
    const macd = ema12.map((v,i)=> v - ema26[i]);
    const signal = ema_tv(9, macd);
    const hist = macd.map((v,i)=> v - signal[i]);

    return {data, macd, signal, hist, ema50, ema200};
}

// ================= LOAD =================
async function load(){

    const tbody = $("#tbl tbody");
    const {available, missing} = await getSymbols();

    for(const symbol of available){

        try{
            const {data, macd, signal, hist, ema50, ema200} = await fetchData(symbol);

            let last = data.length-1;
            let d = data[last];

            let canvasMacd = "macd_"+symbol+"_"+Date.now();
            let canvasEma  = "ema_"+symbol+"_"+Date.now();

            tbody.append(`
            <tr>
                <td class="left">${symbol}</td>
                <td>${parseFloat(d[1]).toFixed(2)}</td>
                <td>${parseFloat(d[2]).toFixed(2)}</td>
                <td>${parseFloat(d[3]).toFixed(2)}</td>
                <td>${parseFloat(d[4]).toFixed(2)}</td>
                <td>${parseFloat(d[5]).toFixed(0)}</td>
                <td>${d[8]}</td>
                <td><canvas id="${canvasEma}"></canvas></td>
                <td><canvas id="${canvasMacd}"></canvas></td>
            </tr>
            `);

            // ===== EMA (10 candle terakhir) =====
            let ema50Slice = ema50.slice(-10);
            let ema200Slice = ema200.slice(-10);

            new Chart(document.getElementById(canvasEma), {
                type: "line",
                data: {
                    labels: Array(10).fill(""),
                    datasets: [
                        {data: ema50Slice, borderColor: "blue", pointRadius: 0},
                        {data: ema200Slice, borderColor: "red", pointRadius: 0}
                    ]
                },
                options: {
                    responsive:false,
                    plugins:{legend:{display:false}},
                    scales:{x:{display:false}, y:{display:false}}
                }
            });

            // ===== MACD =====
            let histSlice = hist.slice(-10);
            let macdSlice = macd.slice(-10);
            let signalSlice = signal.slice(-10);

			let colors = histSlice.map((h,i)=>{
				return getColor(h, histSlice[i-1], i);
			});
			
            let maxAbs = Math.max(...histSlice.map(v => Math.abs(v)));

            new Chart(document.getElementById(canvasMacd), {
                data:{
                    labels:Array(10).fill(""),
                    datasets:[
                        {type:"bar", data:histSlice, backgroundColor:colors},
                        {type:"line", data:macdSlice, borderColor:"blue", pointRadius:0},
                        {type:"line", data:signalSlice, borderColor:"orange", pointRadius:0}
                    ]
                },
                options:{
                    responsive:false,
                    plugins:{legend:{display:false}},
                    scales:{
                        x:{display:false},
                        y:{
                            display:false,
                            min: -maxAbs,
                            max: maxAbs
                        }
                    }
                }
            });

        }catch(e){
            console.log(symbol, e);
        }
    }

    $('#tbl').DataTable({
        paging: false,
        info: false,
        order: [[4, "desc"]],
        columnDefs: [
            { targets: [7,8], orderable: false }
        ]
    });

    if(missing.length){
        $("#missing").html(
            "<b>Tidak ada di Binance:</b><br>"+missing.join(", ")
        );
    }
}

load();

</script>

</body>
</html>
