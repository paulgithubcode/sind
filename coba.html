<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>IDX Downloader (Per Tanggal)</title>
</head>

<body>

<h3>Download IDX Stock Summary (Per Tanggal)</h3>
<button onclick="downloadAll()">Mulai</button>

<pre id="log"></pre>

<script>

function log(msg){
  document.getElementById("log").textContent += msg + "\n"
  console.log(msg)
}

function formatDate(date){
  const y = date.getFullYear()
  const m = String(date.getMonth()+1).padStart(2,"0")
  const d = String(date.getDate()).padStart(2,"0")
  return `${y}-${m}-${d}`
}

// retry fetch
async function fetchWithRetry(url, retry=3){
  try{
    const res = await fetch(url,{credentials:"include"})
    if(!res.ok) throw "bad response"
    return await res.json()
  }
  catch(e){
    if(retry > 0){
      log("retry...")
      await new Promise(r=>setTimeout(r,3000))
      return fetchWithRetry(url, retry-1)
    }
    return null
  }
}

// download file helper
function saveFile(data, filename){

  const blob = new Blob(
    [JSON.stringify(data,null,2)],
    {type:"application/json"}
  )

  const link = document.createElement("a")
  link.href = URL.createObjectURL(blob)
  link.download = filename

  document.body.appendChild(link)
  link.click()
  document.body.removeChild(link)

  // cleanup memory
  setTimeout(()=>URL.revokeObjectURL(link.href),1000)
}

async function downloadAll(){

  let start = new Date("2026-04-18")
  let today = new Date()

  let countDownload = 0

  while(start <= today){

    const day = start.getDay()

    // skip sabtu & minggu
    if(day === 0 || day === 6){
      start.setDate(start.getDate()+1)
      continue
    }

    const date = formatDate(start)

    const url =
    "https://www.idx.co.id/primary/TradingSummary/GetStockSummary?length=9999&start=0&date=" + date

    log("ambil: " + date)

    const data = await fetchWithRetry(url)

    if(data && data.data && data.data.length > 0){

      saveFile(data, "GetStockSummary_" + date + ".json")

      countDownload++

      log("✔ download: " + date)

      // 🔥 penting: jeda antar download supaya tidak diblok browser
      await new Promise(r=>setTimeout(r,2000))

      // 🔥 setiap 50 file, pause panjang
      if(countDownload % 50 === 0){
        log("PAUSE 10 detik...")
        await new Promise(r=>setTimeout(r,10000))
      }

    }else{
      log("✖ skip/kosong: " + date)
    }

    // delay request API
    await new Promise(r=>setTimeout(r,2500))

    start.setDate(start.getDate()+1)
  }

  log("SELESAI")
}

</script>

</body>
</html>
