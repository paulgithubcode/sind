<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MICIN SCANNER PRO TELEGRAM</title>

<link rel="stylesheet"
href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

<style>

body{
    font-family:Arial;
    background:#111;
    color:#eee;
    padding:10px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.green{
    color:#00ff99;
    font-weight:bold;
}

.red{
    color:#ff4d4d;
    font-weight:bold;
}

.yellow{
    color:#ffd700;
    font-weight:bold;
}

table.dataTable thead th{
    position:sticky;
    top:0;
    background:#111;
    z-index:99;
}

.dataTables_wrapper{
    overflow:auto;
}

#log{
    margin-top:20px;
    background:#000;
    color:#00ff99;
    padding:10px;
    height:200px;
    overflow:auto;
    border-radius:5px;
    font-size:13px;
}

</style>

</head>

<body>

<h2>🚀 MICIN SCANNER PRO + TELEGRAM</h2>

<table id="table" class="display" style="width:100%">

<thead>
<tr>
<th>Pair</th>
<th>Price</th>
<th>RVOL 5m</th>
<th>RVOL 15m</th>
<th>Status</th>
</tr>
</thead>

<tbody></tbody>

</table>

<div id="log"></div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script>

// ======================================
// TELEGRAM
// ======================================

const BOT_TOKEN = "8705907765:AAGTBF2ka5cgnZ9jzcnIlXnVxmqjtqc0X1k";
const CHAT_ID = "8241745751";

// anti spam duplicate
let sentCoins = {};

// ======================================
// TABLE
// ======================================

let table = $('#table').DataTable({
    paging:false,
    info:false,
    ordering:true,
    order:[[4,"desc"]],
    scrollX:true
});

// ======================================
// LOG
// ======================================

function log(text){

    console.log(text);

    let div = document.getElementById("log");

    div.innerHTML += text + "<br>";

    div.scrollTop = div.scrollHeight;
}

// ======================================
// SLEEP
// ======================================

function sleep(ms){
    return new Promise(r=>setTimeout(r,ms));
}

// ======================================
// GET INDODAX PAIRS
// ======================================

async function getPairs(){

    let res = await fetch(
        "https://indodax.com/tradingview/search_v2"
    );

    let data = await res.json();

    return data
        .filter(x=>x.symbol.endsWith("IDR"))
        .map(x=>x.symbol);

}

// ======================================
// CONVERT
// ======================================

function toBinance(sym){

    return sym.replace("IDR","USDT");

}

// ======================================
// GET BINANCE KLINES
// ======================================

async function getKlines(symbol, interval){

    let urls = [

        `https://api1.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=50`,

        `https://api2.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=50`,

        `https://api3.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=50`

    ];

    for(let url of urls){

        try{

            let res = await fetch(url);

            if(res.ok){

                return await res.json();

            }

        }catch(err){

            console.log(err);

        }

    }

    return null;

}

// ======================================
// AVG VOLUME
// ======================================

function avgVol(data){

    let v = data
        .slice(-20)
        .map(c=>parseFloat(c[5]));

    return v.reduce((a,b)=>a+b,0)/20;

}

// ======================================
// BREAKOUT
// ======================================

function breakout(data){

    let last = parseFloat(data.at(-1)[4]);

    let high = Math.max(
        ...data
            .slice(-20,-1)
            .map(c=>parseFloat(c[2]))
    );

    return last > high;

}

// ======================================
// WHALE
// ======================================

function whale(data){

    let curr = parseFloat(data.at(-1)[5]);

    let prev = parseFloat(data.at(-2)[5]);

    return curr > prev*2;

}

// ======================================
// CHANGE
// ======================================

function change(data){

    let a = parseFloat(data.at(-1)[4]);

    let b = parseFloat(data.at(-2)[4]);

    return ((a-b)/b)*100;

}

// ======================================
// TELEGRAM SEND
// ======================================

async function sendTelegram(message){

    try{

        let response = await fetch(

            `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,

            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({

                    chat_id:CHAT_ID,

                    text:message

                })
            }

        );

        let data = await response.json();

        console.log(data);

        if(data.ok){

            log("✅ Telegram sent");

        }else{

            log("❌ Telegram failed");

        }

    }catch(err){

        console.log(err);

        log("❌ Telegram error");

    }

}

// ======================================
// PROCESS
// ======================================

async function process(pair){

    try{

        let sym = toBinance(pair);

        let data5 = await getKlines(sym,"5m");

        let data15 = await getKlines(sym,"15m");

        if(!data5 || !data15) return;

        let last = parseFloat(
            data5.at(-1)[4]
        );

        let rvol5 =
            parseFloat(data5.at(-1)[5]) /
            avgVol(data5);

        let rvol15 =
            parseFloat(data15.at(-1)[5]) /
            avgVol(data15);

        let br5 = breakout(data5);

        let br15 = breakout(data15);

        let wh = whale(data5);

        let ch = change(data5);

        let status = "❌ Skip";

        // ======================================
        // LOGIC
        // ======================================

        if(
            rvol5 > 2 &&
            br5 &&
            rvol15 > 1.2 &&
            ch < 5
        ){

            status = "🔥 STRONG CONFIRM";

        }
        else if(
            rvol5 > 2 &&
            ch < 3 &&
            !br15
        ){

            status = "⚡ EARLY (BELUM 15M)";

        }
        else if(
            wh &&
            ch < 4
        ){

            status = "🐋 WHALE";

        }
        else if(
            br5 &&
            rvol5 < 1.5
        ){

            status = "⚠️ FAKE";

        }

        // ======================================
        // COLOR
        // ======================================

        let color = "";

        if(status.includes("STRONG")){

            color = "green";

        }
        else if(status.includes("EARLY")){

            color = "yellow";

        }
        else if(status.includes("WHALE")){

            color = "green";

        }
        else if(status.includes("FAKE")){

            color = "red";

        }

        // ======================================
        // TABLE
        // ======================================

        table.row.add([

            pair,

            last.toFixed(6),

            rvol5.toFixed(2),

            rvol15.toFixed(2),

            `<span class="${color}">
                ${status}
            </span>`

        ]);

        // ======================================
        // TELEGRAM ALERT
        // ======================================

        if(status.includes("STRONG")){

            if(!sentCoins[pair]){

                let harga = new Intl.NumberFormat(
                    'id-ID',
                    {
                        style:'currency',
                        currency:'IDR'
                    }
                ).format(last);

                let msg =
`🚀 STRONG CONFIRM

Coin      : ${pair}

Harga     : ${harga}

RVOL 5M   : ${rvol5.toFixed(2)}

RVOL 15M  : ${rvol15.toFixed(2)}

Status    : ${status}

Time      :
${new Date().toLocaleString()}
`;

                await sendTelegram(msg);

                sentCoins[pair] = true;

                log(
                    "🔥 ALERT SENT : " + pair
                );

            }

        }else{

            sentCoins[pair] = false;

        }

    }catch(err){

        console.log(err);

    }

}

// ======================================
// SCAN
// ======================================

async function scan(){

    log("♻️ START SCAN");

    table.clear().draw();

    let pairs = await getPairs();

    log(
        "📈 TOTAL PAIR : " + pairs.length
    );

    for(let i=0;i<pairs.length;i++){

        await process(pairs[i]);

        await sleep(200);

        if(i%10===0){

            table.draw(false);

            log(
                `✅ ${i}/${pairs.length}`
            );

        }

    }

    table.draw();

    log("🚀 SCAN DONE");

}

// ======================================
// START
// ======================================

scan();

/*// refresh 15 menit
setInterval(() => {

    log("♻️ AUTO REFRESH");

    scan();

}, 900000);*/

</script>

</body>
</html>
